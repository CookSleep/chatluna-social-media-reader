name: Publish Package

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Show tool versions
        run: |
          node --version
          npm --version

      - name: Publish to npm (Trusted Publishing via OIDC)
        id: publish_oidc
        continue-on-error: true
        run: npm publish --access public --provenance

      - name: Publish to npm (NPM_TOKEN fallback)
        if: steps.publish_oidc.outcome == 'failure' && secrets.NPM_TOKEN != ''
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance

      - name: Fail with clear hint
        if: steps.publish_oidc.outcome == 'failure' && secrets.NPM_TOKEN == ''
        run: |
          echo "::error::OIDC 发布失败，且未配置 NPM_TOKEN。"
          echo "::error::请在 npm 设置 Trusted Publisher（repo: CookSleep/chatluna-social-media-reader）或添加仓库 Secret: NPM_TOKEN。"
          exit 1
